---
name: vars-finder

on:
  push:
    branches:
      - main
    paths: ["vars"]
    tags:
      - '*'
      
env:
  BUILD_ARGS: |
          $BUILD_REF
          $BUILD_ARCH
          $BUILD_NAME
          $BUILD_VERSION
          

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Display Vars via Env Var
        run: echo "The var is $GITHUB_REF_NAME"

      - name: Display Vars via Github Context
        run: echo "The Var is ${{ github.event.release.tag_name }}"

      - name: Display Build_ARG
        run: echo "The var is ${{ $BUILD_ARGS }} "

      - name: Display Build_REF
        run: echo "The var is ${{ $BUILD_REF }} "

      - name: Display BUILD_ARCH
        run: echo "The var is ${{ $BUILD_ARCH }} "

      - name: Display BUILD_NAME
        run: echo "The var is ${{ $BUILD_NAME }} "

      - name: Display BUILD_NAME
        run: echo "The var is ${{ $BUILD_VERSION }} "
