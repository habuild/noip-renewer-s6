---
name: vars-finder

on:
  push:
    branches:
      - main
    paths: ["vars"]

env:
  BUILD_ARGS: |
          BUILD_REF 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Display Vars via Env Var
        run: echo "The var is $GITHUB_REF_NAME"

      - name: Display Vars via Github Context
        run: echo "The Var is ${{ github.ref_name }}"

      - name: Display Build_REF
        run: echo "The var is ${{ env.BUILD_REF }} "
    
      - name: Checkout Code
        uses: actions/checkout@v4

      # This dynamically loops and logs every variable defined in your env context
      - name: Echo All Docker Build Args
        run: |
          echo "=== Active Docker Build Arguments ==="
          for var in APP_VERSION ENVIRONMENT API_URL; do
            echo "$var=${{!env[$var]}}"
          done   
